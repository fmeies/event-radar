services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    volumes:
      - sqlite_data:/data
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    restart: unless-stopped
    command: ["/usr/local/bin/supercronic", "/app/crontab"]
    volumes:
      - sqlite_data:/data
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
    depends_on:
      web:
        condition: service_healthy

volumes:
  sqlite_data:
