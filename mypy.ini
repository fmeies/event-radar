[mypy]
python_version = 3.12
ignore_missing_imports = true

# pydantic-settings resolves required fields from env vars — mypy can't see that
[mypy-app.config]
ignore_errors = true

# SQLAlchemy Column[T] vs T false positives — would require Mapped[] migration to fix properly
[mypy-app.models]
ignore_errors = true

[mypy-app.routers.auth]
disable_error_code = assignment,arg-type

[mypy-app.routers.dashboard]
disable_error_code = assignment,arg-type

[mypy-app.search_pipeline]
disable_error_code = arg-type
